# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: jotter

before:
  hooks:
    - go mod tidy

builds:
  - id: jotter
    main: ./
    binary: jotter
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sebjacobs/jotter/cmd.version={{.Version}}
      - -X github.com/sebjacobs/jotter/cmd.commit={{.FullCommit}}
      - -X github.com/sebjacobs/jotter/cmd.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "jotter_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  disable: true

release:
  header: |
    See [CHANGELOG.md](https://github.com/sebjacobs/jotter/blob/main/CHANGELOG.md) for the full list of changes.

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

homebrew_casks:
  - name: jotter
    binaries: [jotter]
    repository:
      owner: sebjacobs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/sebjacobs/jotter"
    description: "Append-only, git-backed log for Claude Code sessions"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "jotter: bump to {{ .Tag }}"
    generate_completions_from_executable:
      executable: "jotter"
      args:
        - completion
      base_name: "jotter"
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    caveats: |
      Run `jotter setup` once to wire jotter into Claude Code —
      it configures the data dir, installs the session skills, and
      grants the Bash(jotter:*) permission.
